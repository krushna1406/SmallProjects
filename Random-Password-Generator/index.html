<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Random Password Generator</title>
   <link rel="stylesheet" href="style.css">
</head>

<body>
   <div class="container">
      <h2>Random Password Generator</h2>
      <div class="input">
         <input type="checkbox" id="lowercase">
         <label for="lowercase">Include Lowercase Characters (a - z)</label><br>
         <input type="checkbox" id="uppercase">
         <label for="uppercase">Include Uppercase Characters (A - Z)</label><br>
         <input type="checkbox" id="symbols">
         <label for="symbols">Include Symbols ( @,$,#,&,*, etc )</label><br>
         <input type="checkbox" id="numbers">
         <label for="numbers">Include Numbers ( 0-9 )</label><br>
      </div>

      <label for="text-box">Enter the length of password</label><br>
      <input type="text" placeholder="Ex. 12" id="text-box"><br>

      <button id="generate">Generate Password</button>
      <button id="refresh">Clear</button>

      <!-- <h3 id="msg">Generated Password:</h3> -->
      <div class="password"></span></div>
   </div>

   <script src="script.js"></script>
</body>

</html>
