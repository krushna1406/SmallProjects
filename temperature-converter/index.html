<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Temperature Converter</title>
   <link rel="stylesheet" href="style.css">
</head>

<body>
   <div class="container">
      <h1>Temperature Conversion</h1>
      <input type="number" id="text-box" placeholder="0"><br>

      <input type="radio" name="unit" id="toFahrenheit">
      <label for="toFahrenheit">Celcius → Fahrenheit</label><br>

      <input type="radio" name="unit" id="toCelcius">
      <label for="toCelcius">Fahrenheit → Celcius</label><br>

      <button>Submit</button>

      <p class="result"></p>
      <script src="script.js"></script>
   </div>

</body>

</html>
